name: Set build name
description: Build the artifact name from the current ref, toolchain, and target.

inputs:
  toolchain:
    description: Rust toolchain to use in the artifact name
    required: true
  target:
    description: Rust target triple to use in the artifact name
    required: true

outputs:
  build_name:
    description: The computed build artifact name
    value: ${{ steps.set-build-name.outputs.build_name }}

runs:
  using: composite
  steps:
    - id: set-build-name
      shell: bash
      run: |
        SAFE_REF="${GITHUB_REF_NAME//\//-}"
        BUILD_NAME="gnostr-${SAFE_REF}-${{ inputs.toolchain }}-${{ inputs.target }}"
        echo "BUILD_NAME=$BUILD_NAME" >> "$GITHUB_ENV"
        echo "build_name=$BUILD_NAME" >> "$GITHUB_OUTPUT"
