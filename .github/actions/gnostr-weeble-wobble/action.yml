name: gnostr-weeble-wobble
description: Resolve weeble, blockheight, and wobble values for workflows

outputs:
  weeble:
    description: Current weeble value
    value: ${{ steps.resolve.outputs.weeble }}
  blockheight:
    description: Current blockheight value
    value: ${{ steps.resolve.outputs.blockheight }}
  wobble:
    description: Current wobble value
    value: ${{ steps.resolve.outputs.wobble }}

runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      run: |
        set -euo pipefail

        get_value() {
          local modern_cmd="$1"
          local legacy_arg="$2"

          if command -v "$modern_cmd" >/dev/null 2>&1; then
            "$modern_cmd"
            return 0
          fi

          if ! command -v gnostr >/dev/null 2>&1; then
            echo "Neither '$modern_cmd' nor 'gnostr' is available. Install gnostr and ensure it is in PATH." >&2
            return 1
          fi

          gnostr "$legacy_arg"
        }

        weeble="$(get_value gnostr-weeble --weeble | tr -d '\r\n')"
        blockheight="$(get_value gnostr-blockheight --blockheight | tr -d '\r\n')"
        wobble="$(get_value gnostr-wobble --wobble | tr -d '\r\n')"

        [ -n "$weeble" ] || { echo "Resolved weeble value is empty." >&2; exit 1; }
        [ -n "$blockheight" ] || { echo "Resolved blockheight value is empty." >&2; exit 1; }
        [ -n "$wobble" ] || { echo "Resolved wobble value is empty." >&2; exit 1; }

        {
          echo "weeble=$weeble"
          echo "blockheight=$blockheight"
          echo "wobble=$wobble"
        } >> "$GITHUB_OUTPUT"
