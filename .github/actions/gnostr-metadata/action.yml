name: gnostr Metadata
description: >
  Publishes a gnostr metadata event derived from the current GitHub Actions
  environment, then queries the event back and prints a njump.me link.

inputs:
  nsec:
    description: 'Optional nsec; defaults to the repository-id hash'
    required: false
    default: '$(gnostr --hash "$GITHUB_REPOSITORY_ID")'
  pow:
    description: 'Proof-of-work difficulty target'
    required: false
    default: '16'
  damus:
    description: 'Primary relay WebSocket URL'
    required: false
    default: 'wss://relay.damus.io'
  nos:
    description: 'Secondary relay WebSocket URL'
    required: false
    default: 'wss://nos.lol'
  njump_base:
    description: 'Base URL for the human-readable Nostr event link'
    required: false
    default: 'http://njump.me'
  p_tag:
    description: ''
    required: false
    default: 'https://avatars.githubusercontent.com/u/135379339?s=400&u=11cb72cccbc2b13252867099546074c50caef1ae&v=4'
  b_tag:
    description: ''
    required: false
    default: 'https://raw.githubusercontent.com/gnostr-org/gnostr-icons/refs/heads/master/banner/1024x341.png'

runs:
  using: composite
  steps:
    - id: build-args
      name: Build metadata args
      shell: bash
      run: |
        {
          echo 'args<<EOF'
          printf '%s\n' \
            -n \
            gnostr-bot \
            -a \
            "$GITHUB_REPOSITORY_OWNER #$GITHUB_REPOSITORY_ID" \
            -e \
            "repo|$GITHUB_REPOSITORY" \
            -e \
            "workflow|$GITHUB_WORKFLOW" \
            -e \
            "workflow_sha|$GITHUB_WORKFLOW_SHA" \
            -e \
            "workflow_ref|$GITHUB_WORKFLOW_REF" \
            -e \
            "github_ref|$GITHUB_REF" \
            -e \
            "github_run_id|$GITHUB_RUN_ID" \
            -e \
            "gnostr|gnostr" \
            -e \
            "gnostr-bot|gnostr-bot" \
            -e \
            "github_repo_owner|$GITHUB_REPOSITORY_OWNER" \
            -e \
            "date|$(date +%s)" \
            -e \
            "runner_env|$RUNNER_ENVIRONMENT" \
            -e \
            "runner_os|$RUNNER_OS" \
            -e \
            "weeble|$(gnostr --weeble)" \
            -e \
            "blockheight|$(gnostr --blockheight)" \
            -e \
            "wobble|$(gnostr --wobble)" \
            -p \
            "${{ inputs.p_tag }}" \
            -b \
            "${{ inputs.b_tag }}"
          echo EOF
          echo 'query_relays<<EOF'
          printf '%s\n' "${{ inputs.damus }}" "${{ inputs.nos }}"
          echo EOF
        } >> "$GITHUB_OUTPUT"

    - name: Post Nostr notification
      uses: ./.github/actions/gnostr-command
      with:
        command: set-metadata
        help_command: set-metadata
        nsec: ${{ inputs.nsec }}
        pow: ${{ inputs.pow }}
        relays: |
          ${{ inputs.damus }}
        args: ${{ steps.build-args.outputs.args }}
        hex: 'true'
        convert_note: 'true'
        query_relays: ${{ steps.build-args.outputs.query_relays }}
        njump_base: ${{ inputs.njump_base }}
