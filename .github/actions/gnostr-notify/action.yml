name: gnostr Nostr Notification
description: >
  Posts a CI job-status notification as a kind-1 Nostr event to configured
  relays via gnostr, then queries the event back and prints a njump.me link.

inputs:
  status:
    description: 'Human-readable status label, e.g. "Failed!", "Cancelled!", "Success!"'
    required: true
  job_url:
    description: 'URL to the current GitHub Actions job run'
    required: true
  matrix_label:
    description: 'Human-readable matrix label, e.g. "ubuntu-latest, stable"'
    required: true
  pow:
    description: 'Proof-of-work difficulty target'
    required: false
    default: '16'
  damus:
    description: 'Primary relay WebSocket URL'
    required: false
    default: 'wss://relay.damus.io'
  nos:
    description: 'Secondary relay WebSocket URL'
    required: false
    default: 'wss://nos.lol'
  njump_base:
    description: 'Base URL for the human-readable Nostr event link'
    required: false
    default: 'http://njump.me'

runs:
  using: composite
  steps:
    - name: Post Nostr notification
      shell: bash
      run: |
        EVENT=$(gnostr \
          --nsec "$(gnostr --hash "$GITHUB_REPOSITORY_ID")" \
          -d ${{ inputs.pow }} \
          -r ${{ inputs.damus }} \
          ,${{ inputs.nos }} \
          custom-event \
          -k 1 \
          -c "[$GITHUB_REPOSITORY_ID](${{ inputs.job_url }}) (${{ inputs.matrix_label }}) ${{ inputs.status }}" \
          -t "$GITHUB_REPOSITORY" \
          ,"$GITHUB_WORKFLOW" \
          ,"$GITHUB_WORKFLOW_SHA" \
          ,"$GITHUB_WORKFLOW_REF" \
          ,"$GITHUB_REF" \
          ,"$GITHUB_RUN_ID" \
          ,"gnostr" \
          ,"gnostr-bot" \
          ,"$GITHUB_REPOSITORY_OWNER" \
          ,"$(date +%s)" \
          ,"$RUNNER_ENVIRONMENT" \
          ,"$RUNNER_OS" \
          ,"$(gnostr --weeble)" \
          ,"$(gnostr --blockheight)" \
          ,"$(gnostr --wobble)" \
          --hex || true) && \
          export EVENT=$EVENT && \
          NOTE=$(gnostr convert-key -p note -k $EVENT || true) || true && \
          export NOTE=$NOTE && echo $NOTE && echo $EVENT && \
          gnostr query -i $EVENT -r ${{ inputs.damus }} || true && \
          gnostr query -i $EVENT -r ${{ inputs.nos }} || true && \
          echo "${{ inputs.njump_base }}/$NOTE"
