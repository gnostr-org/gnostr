name: gnostr Nostr Notification
description: >
  Posts a CI job-status notification as a kind-1 Nostr event to configured
  relays via gnostr, then queries the event back and prints a njump.me link.

inputs:
  nsec:
    description: 'a nostr nsec of sha256 hash'
    required: false
    default: '$(gnostr --hash "$GITHUB_REPOSITORY_ID")'
  kind:
    description: 'Nostr event kind (integer, e.g. 1)'
    required: true
  content:
    description: 'Event content string'
    required: true
  tags:
    description: 'Comma-separated list of tags (e.g. tag1,tag2,tag3)'
    required: false
    default: ''
  pow:
    description: 'Proof-of-work difficulty target'
    required: false
    default: '16'
  damus:
    description: 'Primary relay WebSocket URL'
    required: false
    default: 'wss://relay.damus.io'
  nos:
    description: 'Secondary relay WebSocket URL'
    required: false
    default: 'wss://nos.lol'
  njump_base:
    description: 'Base URL for the human-readable Nostr event link'
    required: false
    default: 'http://njump.me'

runs:
  using: composite
  steps:
    - name: Post Nostr notification
      shell: bash
      run: |
        gnostr custom-event -h
        EVENT=$(gnostr \
          --nsec ${{ inputs.nsec }} \
          -d ${{ inputs.pow }} \
          -r ${{ inputs.damus }} \
          -r ${{ inputs.nos }} \
          custom-event \
          -k ${{ inputs.kind }} \
          -c ${{ inputs.content }} \
          -c ${{ inputs.tags }} \
          --hex || true) && \
          export EVENT=$EVENT && \
          NOTE=$(gnostr convert-key -p note -k $EVENT || true) || true && \
          export NOTE=$NOTE && echo $NOTE && echo $EVENT && \
          echo "${{ inputs.njump_base }}/$NOTE"
