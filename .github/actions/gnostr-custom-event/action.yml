name: gnostr Custom Event
description: >
  Publishes a custom gnostr event, optionally converts the resulting event id to
  a note id, and prints a njump.me link.

inputs:
  nsec:
    description: 'a nostr nsec of sha256 hash'
    required: false
    default: '$(gnostr --hash "$GITHUB_REPOSITORY_ID")'
  kind:
    description: 'Nostr event kind (integer, e.g. 1)'
    required: true
  content:
    description: 'Event content string'
    required: true
  tags:
    description: 'Comma-separated list of tags (e.g. tag1,tag2,tag3)'
    required: false
    default: ''
  pow:
    description: 'Proof-of-work difficulty target'
    required: false
    default: '16'
  damus:
    description: 'Primary relay WebSocket URL'
    required: false
    default: 'wss://relay.damus.io'
  nos:
    description: 'Secondary relay WebSocket URL'
    required: false
    default: 'wss://nos.lol'
  njump_base:
    description: 'Base URL for the human-readable Nostr event link'
    required: false
    default: 'http://njump.me'

runs:
  using: composite
  steps:
    - id: build-args
      name: Build custom-event args
      shell: bash
      run: |
        {
          echo 'args<<EOF'
          printf '%s\n' \
            -k \
            "${{ inputs.kind }}" \
            -c \
            "${{ inputs.content }}"
          if [ -n "${{ inputs.tags }}" ]; then
            printf '%s\n' \
              -t \
              "${{ inputs.tags }}"
          fi
          echo EOF
          echo 'relays<<EOF'
          printf '%s\n' "${{ inputs.damus }}" "${{ inputs.nos }}"
          echo EOF
        } >> "$GITHUB_OUTPUT"

    - name: Post Nostr notification
      uses: ./.github/actions/gnostr-command
      with:
        command: custom-event
        help_command: custom-event
        nsec: ${{ inputs.nsec }}
        pow: ${{ inputs.pow }}
        relays: ${{ steps.build-args.outputs.relays }}
        args: ${{ steps.build-args.outputs.args }}
        hex: 'true'
        convert_note: 'true'
        njump_base: ${{ inputs.njump_base }}
