name: 'Setup OpenSSL and Perl for Windows'
description: 'Sets OPENSSL_NO_VENDOR, OPENSSL_DIR, and installs Strawberry Perl and required Perl modules on Windows.'
runs:
  using: 'composite'
  steps:
    - name: Set OpenSSL environment variables
      if: runner.os == 'Windows'
      shell: bash
      run: |
        echo "OPENSSL_NO_VENDOR=1" >> $GITHUB_ENV
        echo "OPENSSL_DIR=C:/path/to/vcpkg/installed/x64-windows-static-md" >> $GITHUB_ENV
    - name: Install Strawberry Perl
      if: runner.os == 'Windows'
      shell: bash
      run: |
        choco install strawberryperl -y
        echo "C:\Strawberry\perl\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "C:\Strawberry\c\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
    - name: Install Perl modules
      if: runner.os == 'Windows'
      shell: bash
      run: perl -MCPAN -e "install Locale::Maketext::Simple"
