name: gnostr-test-matrix

# Controls when the action will run.
on:
  schedule:
    - cron: "*/30 * * * *" # run 30th minute
  push:
    branches:
      - "**"
  workflow_dispatch:
permissions:
  actions: read
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  windows-vcpkg:
    strategy:
      matrix:
        os:
          - runner: windows-latest
            arch: x64
          - runner: windows-11-arm
            arch: arm64
      fail-fast: true
    name: windows-vcpkg-${{ matrix.os.arch }}
    runs-on: ${{ matrix.os.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: sfackler/actions/rustup@master
      - run: echo "version=$(rustc --version)" >> $GITHUB_OUTPUT
        id: rust-version
      - run: echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append
      - run: vcpkg install openssl:${{ matrix.os.arch }}-windows-static-md
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index
          key: index-${{ runner.os }}-${{ github.run_number }}
          restore-keys: |
            index-${{ runner.os }}-
      - run: cargo generate-lockfile
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/cache
          key: registry-${{ runner.os }}-${{ steps.rust-version.outputs.version }}-${{ hashFiles('Cargo.lock') }}
      - run: cargo fetch
      - uses: actions/cache@v4
        with:
          path: target
          key: target-${{ github.job }}-${{ steps.rust-version.outputs.version }}-${{ hashFiles('Cargo.lock') }}
      - run: cargo test -j8

  gnostr-bot:
    env:
      FORCE: "--force"
      GNOSTR: "gnostr"
      POW: "16"
      DAMUS: "wss://relay.damus.io"
      NOS: "wss://nos.lol"
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest, macos-15-intel]
        toolchain: [stable, nightly]
        #commands: [""]  # , "sniper", "chat", "legit", "ngit", "set-metadata", "note"]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          submodules: recursive
          set-safe-directory: true
          fetch-depth: 0
          fetch-tags: false

      - name: Cache Cargo registry and Git dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-git-${{ runner.os }}-${{ matrix.toolchain }}-${{ hashFiles('Cargo.lock') }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Cache Cargo build target
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-build-target-${{ runner.os }}-${{ matrix.toolchain }}-${{ hashFiles('Cargo.lock') }}

      - name: Run sccache-cache only on non-release runs
        if: github.event_name != 'release' && matrix.os != 'macos-15-intel'
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set Rust caching env vars only on non-release runs
        run: |
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          # echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        if: github.event_name != 'release' && github.event_name != 'workflow_dispatch' && matrix.os != 'macos-15-intel'

      - name: Use Bash for all subsequent steps
        shell: bash
        run: |
          echo GNOSTR=${{ env.GNOSTR }}
          echo MEMPOOL=${{ env.MEMPOOL }}
          echo POW=${{ env.POW }}
          echo DAMUS=${{ env.DAMUS }}
          echo NOS=${{ env.NOS }}
        env:
          MEMPOOL: "mempool"
          MEMPOOL_SPACE: "mempool-space"

      - uses: cargo-bins/cargo-binstall@main
      - uses: styfle/cancel-workflow-action@0.11.0
        if: ${{ !env.ACT }}
        with:
          access_token: ${{ github.token }}

      ##- name: Restore rustup
      ##  id: cache-rustup-restore
      ##  uses: actions/cache/restore@v3
      ##  if: ${{ !env.ACT }}
      ##  with:
      ##    path: |
      ##      ~/.rustup
      ##    key: ${{ runner.os }}-rustup-${{ matrix.toolchain }}

      ##- name: Restore cargo
      ##  id: cache-cargo-restore
      ##  uses: actions/cache/restore@v3
      ##  if: ${{ !env.ACT }}
      ##  with:
      ##    path: |
      ##      ~/.cargo
      ##    key: ${{ runner.os }}-cargo-${{ matrix.toolchain }}

      ##- name: Install Rust toolchain
      ##  uses: actions-rust-lang/setup-rust-toolchain@v1
      ##  with:
      ##    toolchain: ${{ matrix.toolchain }}
      ##    # components: rustfmt, clippy
      ##    # targets: wasm32-unknown-unknown

      - run: |
          rustup default ${{ matrix.toolchain }}

      #- name: Restore target
      #  if: ${{ !env.ACT }}
      #  id: cache-target-restore
      #  uses: actions/cache/restore@v3
      #  with:
      #    path: |
      #      target
      #    key: ${{ runner.os }}-target-${{ matrix.rustup }}

      - uses: actions/checkout@v4
        with:
          # Fetches all history for all branches and tags
          # Required for tools like 'git describe' or semantic versioning
          fetch-depth: 0

          # Ensures the workspace is added to git's safe.directory config
          # Crucial for avoiding "dubious ownership" errors in containerized builds
          set-safe-directory: "true"

          # Optional: Uncomment if you need git submodules
          # submodules: 'true'

          # Optional: Uncomment if you want to explicitly disable tag fetching
          # fetch-tags: 'false'

      - name: Calculate Odd/Even Status
        id: time_check_hour
        uses: ./.github/actions/calculate-odd-even

      - name: printenv
        shell: bash
        run: |
          printenv || true

      #- name: coverage.sh
      #  shell: bash
      #  run: |
      #    ./coverage.sh ${{ matrix.rustup }} || true

      - name: make
        shell: bash
        run: |
          make || true

      - name: cargo search gnostr --limit 100
        shell: bash
        run: |
          cargo search gnostr --limit 100

      - name: Install gnostr via cargo-binstall
        shell: bash
        run: |
          cargo-binstall --force --no-confirm gnostr && gnostr --help || true

      - run: /bin/bash -c "sudo apt-get update && sudo apt-get install -y build-essential procps curl file git libssl-dev"
        if: matrix.os == 'ubuntu-latest'

      #- run: cargo install sccache --force -j8
      #  if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'

      #- name: winget install sccache
      #  shell: bash
      #  run: |
      #    winget install Mozilla.sccache --accept-package-agreements --accept-source-agreements
      #  if: runner.os == 'windows'

      - name: Install Strawberry Perl
        run: choco install strawberryperl -y
        if: runner.os == 'windows'
      - name: Install Perl modules
        run: perl -MCPAN -e "install Locale::Maketext::Simple"
        if: runner.os == 'windows'

      - name: brew install
        run: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        if: runner.os == 'macos'

      - name: Install OpenSSL for macOS
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            arch -arm64 brew install openssl@3
          else
            brew install openssl@3
          fi
          echo "$(brew --prefix openssl@3)/bin" >> $GITHUB_PATH
          echo "LDFLAGS=-L$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I$(brew --prefix openssl@3)/include" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV
        if: runner.os == 'macos'

      - name: linuxbrew (with retries)
        run: |
          test -d ~/.linuxbrew && eval "$(~/.linuxbrew/bin/brew shellenv)"
          test -d /home/linuxbrew/.linuxbrew && eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "eval \"\$($(brew --prefix)/bin/brew shellenv)\"" >> ~/.bashrc
          cargo-binstall --force --no-confirm gnostr && gnostr --help || true
        if: matrix.os == 'ubuntu-latest'

      - name: brew tap gnostr-org/homebrew-gnostr-org
        run: |
          BREW_CMD="$([ "$(uname -m)" = "arm64" ] && [ "$(uname -s)" = "Darwin" ] && echo "arch -arm64 brew" || echo "brew")"
          $BREW_CMD tap gnostr-org/homebrew-gnostr-org || true
        if: runner.os != 'windows'

      - name: brew tap nostorg/nostr
        run: |
          BREW_CMD="$([ "$(uname -m)" = "arm64" ] && [ "$(uname -s)" = "Darwin" ] && echo "arch -arm64 brew" || echo "brew")"
          $BREW_CMD tap nostorg/nostr || true
        if: runner.os != 'windows'

      - name: brew tap randymcmillan/homebrew-randymcmillan
        run: |
          BREW_CMD="$([ "$(uname -m)" = "arm64" ] && [ "$(uname -s)" = "Darwin" ] && echo "arch -arm64 brew" || echo "brew")"
          $BREW_CMD tap randymcmillan/homebrew-randymcmillan || true
        if: runner.os != 'windows'

      - name: brew install gnostr (cargo-binstall)
        run: |
          cargo-binstall --force --no-confirm gnostr && gnostr --help || true
        if: runner.os != 'windows'

      - name: brew install cargo-llvm-cov cargo-llvm-lines
        run: |
          BREW_CMD="$([ "$(uname -m)" = "arm64" ] && [ "$(uname -s)" = "Darwin" ] && echo "arch -arm64 brew" || echo "brew")"
          $BREW_CMD install cargo-llvm-cov cargo-llvm-lines || true
        if: runner.os != 'windows'

      #- name: powershell install gnostr
      #  shell: powershell
      #  run: powershell -ExecutionPolicy Bypass -c "irm https://github.com/gnostr-org/gnostr/releases/download/v1905.926180.332424/gnostr-installer.ps1 | iex"
      #  if: runner.os == 'windows'
      #- name: gnostr ${{ matrix.commands }}
      #  shell: bash
      #  run: |
      #    gnostr ${{ matrix.commands }} -V
      #    gnostr ${{ matrix.commands }} --version
      #    gnostr ${{ matrix.commands }} -h
      #    gnostr ${{ matrix.commands }} --help
      - name: create set-metadata kind 0
        uses: ./.github/actions/gnostr-custom-event
        with:
          kind: 0
          content: 'Set metadata event triggered by CI'

      - name: Create custom-event kind 1
        uses: ./.github/actions/gnostr-custom-event
        with:
          kind: 1
          content: 'Custom event kind 1 triggered by CI'

      #- name: 🌙 UTC second is ODD
      #  if: ${{ steps.time_check_hour.outputs.is_even != 'true' }} && runner.os != 'windows'
      #  run: |
      #    cargo clean && echo "✅" || echo "❌"

      - name: 🚀 cargo run --bin gnostr -- 
        #if: ${{ steps.time_check_hour.outputs.is_even == 'true' }}
        shell: bash
        run: |
          cargo run --bin gnostr -- --version
          cargo run --bin gnostr -- nip34 --help
          cargo run --bin gnostr -- nip34 repo-announcement --help
          cargo run --bin gnostr -- nip34 repo-state --help
          cargo run --bin gnostr -- nip34 patch --help
          cargo run --bin gnostr -- nip34 pull-request --help
          cargo run --bin gnostr -- nip34 issue --help
          cargo run --bin gnostr -- nip34 status --help

      - name: 🚀 cargo test -j8
        #if: ${{ steps.time_check_hour.outputs.is_even == 'true' }}
        shell: bash
        run: |
          cargo test -j8 && echo "✅" ## || echo "❌"
        if: matrix.os != 'windows-latest'

      - name: gnostr ngit fetch
        shell: bash
        run: |
          git remote add gitworkshop nostr://npub1ahaz04ya9tehace3uy39hdhdryfvdkve9qdndkqp3tvehs6h8s5slq45hy/gnostr
          cargo run --bin gnostr -- ngit --help
          #cargo run --bin gnostr -- ngit --nsec $(gnostr --hash "") list
          cargo run --bin gnostr -- ngit --nsec $(gnostr --hash '') fetch 2>/dev/null || true
        if: ${{ !env.ACT }}

      - name: 🌙 UTC second is ODD
        if: ${{ steps.time_check_hour.outputs.is_even != 'true' }}
        run: |
          make gnostr-chat &
          make gnostr-chat &
          gnostr chat --oneshot "testing gnostr oneshot" --topic gnostr &
          gnostr chat --oneshot "testing gnostr oneshot" --topic gnostr
          sleep 5 # Wait for services to start
          gnostr query --limit 100

      - name: Cleanup lingering gnostr processes
        uses: ./.github/actions/gnostr-cleanup
        continue-on-error: true

      - name: Debug GITHUB_API_URL
        run: |
          echo "GITHUB_API_URL: ${{ env.GITHUB_API_URL }}"

      - name: Get Job Info
        id: jobs
        shell: bash
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GITHUB_API="/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs"
          JOBINFO="$(curl --retry 3 --get -Ss -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "${{ github.api_url }}${GITHUB_API}?per_page=100")" || exit 0
          if [ -z "$JOBINFO" ] || [ "$JOBINFO" = "null" ]; then
            echo "Could not fetch job info, skipping..."
            exit 0
          fi
          echo "Available jobs:"
          echo "$JOBINFO" | jq '.jobs[].name' || true
          JOB_NAME="gnostr-bot (${{ matrix.os }}, ${{ matrix.toolchain }})"
          HTML_URL=$(echo "$JOBINFO" | jq -r --arg job_name "$JOB_NAME" '.jobs | map(select(.name == $job_name)) | .[0].html_url // empty')
          if [ -n "$HTML_URL" ] && [ "$HTML_URL" != "null" ]; then
            echo "html_url=$HTML_URL" >> $GITHUB_OUTPUT
          else
            echo "html_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Output Current Job Log URL
        run: echo ${{ steps.jobs.outputs.html_url }}

      - name: Execute script on failure
        if: failure()
        uses: ./.github/actions/gnostr-notify
        with:
          status: 'Failed!'
          job_url: ${{ steps.jobs.outputs.html_url }}
          matrix_label: '${{ matrix.os }}, ${{ matrix.toolchain }}'
          pow: ${{ env.POW }}
          damus: ${{ env.DAMUS }}
          nos: ${{ env.NOS }}
          njump_base: 'http://nostr.band'

      - name: Execute script on cancelled
        if: cancelled()
        uses: ./.github/actions/gnostr-notify
        with:
          status: 'Cancelled!'
          job_url: ${{ steps.jobs.outputs.html_url }}
          matrix_label: '${{ matrix.os }}, ${{ matrix.toolchain }}'
          pow: ${{ env.POW }}
          damus: ${{ env.DAMUS }}
          nos: ${{ env.NOS }}
          njump_base: 'http://nostr.band'

      - name: Execute script on success
        if: success()
        uses: ./.github/actions/gnostr-notify
        with:
          status: 'Success!'
          job_url: ${{ steps.jobs.outputs.html_url }}
          matrix_label: '${{ matrix.os }}, ${{ matrix.toolchain }}'
          pow: ${{ env.POW }}
          damus: ${{ env.DAMUS }}
          nos: ${{ env.NOS }}
          njump_base: 'http://nostr.band'

      ## NOTE: The cache restore steps (cache-cargo-restore, cache-target-restore) above are
      ## commented out since actions/cache@v4 at lines 76-91 already handles both restore and save.
      ## The separate save steps below are therefore also commented out to avoid referencing
      ## undefined step outputs.
      ##
      ## - name: Save cargo
      ##   id: cache-cargo-save
      ##   uses: actions/cache/save@v4
      ##   if: ${{ !env.ACT }}
      ##   with:
      ##     path: |
      ##       ~/.cargo
      ##     key: ${{ steps.cache-cargo-restore.outputs.cache-primary-key }}
      ##
      ## - name: Save target
      ##   id: cache-target-save
      ##   uses: actions/cache/save@v4
      ##   if: ${{ !env.ACT }}
      ##   with:
      ##     path: |
      ##       target
      ##     key: ${{ steps.cache-target-restore.outputs.cache-primary-key }}
