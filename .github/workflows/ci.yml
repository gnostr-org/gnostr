name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Trusted CI — runs on self-hosted runner for pushes to master.
  ci-trusted:
    if: github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Run rustfmt (warning-only)
        shell: bash
        run: |
          if ! cargo fmt --all --check; then
            echo "::warning::cargo fmt reported formatting differences (diff shown above)."
          fi
      - name: Run clippy (warning-only)
        shell: bash
        run: |
          if ! cargo clippy --workspace --all-targets; then
            echo "::warning::cargo clippy reported issues (details shown above)."
          fi
      - run: cargo test --workspace
        continue-on-error: true

  # PR CI — runs on GitHub-hosted runner for pull requests.
  ci-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Run rustfmt (warning-only)
        shell: bash
        run: |
          if ! cargo fmt --all --check; then
            echo "::warning::cargo fmt reported formatting differences (diff shown above)."
          fi
      - name: Run clippy (warning-only)
        shell: bash
        run: |
          if ! cargo clippy --workspace --all-targets; then
            echo "::warning::cargo clippy reported issues (details shown above)."
          fi
      - run: cargo test --workspace
        continue-on-error: true
