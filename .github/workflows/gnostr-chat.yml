---
name: Gnostr Chat

on:
  workflow_run:
    workflows:
      - gnostr-test-matrix
    types:
      - completed
  workflow_dispatch:
  repository_dispatch:
    types: [run-gnostr-chat-workflow]
  push:
    branches:
      - "**"

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  gnostr-chat:
    name: Gnostr Chat
    env:
      FORCE: "--force"
      GNOSTR: "gnostr"
      POW: "16"
      DAMUS: "wss://relay.damus.io"
      NOS: "wss://nos.lol"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      matrix:
        os: [ubuntu-latest] # macos, ubuntu, windows
        rustup: [stable, nightly]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: echo test
        run: |
          echo GNOSTR=${{ env.GNOSTR }}
          echo MEMPOOL=${{ env.MEMPOOL }}
          echo POW=${{ env.POW }}
          echo DAMUS=${{ env.DAMUS }}
          echo NOS=${{ env.NOS }}
          printenv
        env:
          MEMPOOL: "mempool"
          MEMPOOL_SPACE: "mempool-space"

      - uses: styfle/cancel-workflow-action@0.11.0
        if: ${{ env.ACT == 'false' }}
        with:
          access_token: ${{ github.token }}

      - uses: actions/checkout@v3
        with:
          submodules: 'true'
          set-safe-directory: 'true'
          fetch-depth: '0'
          fetch-tags: 'false'
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Restore rustup
        id: cache-rustup-restore
        uses: actions/cache/restore@v4
        if: ${{ !env.ACT }}
        with:
          path: |
            ~/.rustup
          key: ${{ runner.os }}-rustup-${{ matrix.rustup }}

      - name: Restore cargo
        id: cache-cargo-restore
        uses: actions/cache/restore@v4
        if: ${{ !env.ACT }}
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-git-${{ runner.os }}-${{ matrix.rustup }}-${{ hashFiles('Cargo.lock') }}

      - name: Restore cargo bin
        id: cache-cargo-bin-restore
        uses: actions/cache/restore@v4
        if: ${{ !env.ACT }}
        with:
          path: ~/.cargo/bin/gnostr
          key: cargo-bin-${{ runner.os }}-${{ matrix.rustup }}-${{ hashFiles('Cargo.lock') }}

      - name: Restore target
        id: cache-target-restore
        uses: actions/cache/restore@v4
        if: ${{ !env.ACT }}
        with:
          path: |
            target
          key: cargo-build-target-${{ runner.os }}-${{ matrix.rustup }}-${{ hashFiles('Cargo.lock') }}

      - name: List restored target
        shell: bash
        run: |
          ls -l ~/.cargo/bin/gnostr || true
          mkdir -p target
          find target -maxdepth 3 -print | sort

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # You can specify a toolchain channel (stable, beta, nightly) or a specific version (e.g., '1.70.0').
          # If not specified, it defaults to 'stable'. 
          # It can also read the version from a 'rust-toolchain.toml' file if present.
          toolchain: ${{ matrix.rustup }}
          # Comma-separated list of additional components to install.
          components: clippy, rustfmt
          # Automatically configure smart caching (recommended for speed)
          cache: true
          # Do not add -D warnings to RUSTFLAGS (allow all warnings)
          rustflags: ""

      - run: rustup default ${{ matrix.rustup }}
      - name: Install cargo-binstall
        id: binstall
        continue-on-error: true
        if: ${{ !env.ACT && !hashFiles('target/debug/gnostr') }}
        uses: cargo-bins/cargo-binstall@v1.18.1

      - name: Fallback install cargo-binstall (from crates.io)
        if: ${{ !env.ACT && !hashFiles('target/debug/gnostr') && steps.binstall.outcome != 'success' }}
        shell: bash
        run: |
          set -euxo pipefail
          cargo install cargo-binstall --locked

      #- name: Install gnostr via cargo-binstall
      #  if: ${{ !env.ACT && !hashFiles('target/debug/gnostr') }}
      #  uses: ./.github/actions/cargo-binstall-gnostr
      # - run: cargo build --bin gnostr
      
      # Use the restored target cache from gnostr-test-matrix.yml.
      - run: |
          if [ -f target/debug/gnostr ]; then
            chmod +x ./target/debug/gnostr
            GNOSTR_CMD=./target/debug/gnostr
          elif [ -f ~/.cargo/bin/gnostr ]; then
            chmod +x "$HOME/.cargo/bin/gnostr"
            GNOSTR_CMD="$HOME/.cargo/bin/gnostr"
          else
            GNOSTR_CMD="cargo run --bin gnostr -- "
          fi

          $GNOSTR_CMD --help
      - run: |
          if [ -f target/debug/gnostr ]; then
            chmod +x ./target/debug/gnostr
            GNOSTR_CMD=./target/debug/gnostr
          elif [ -f ~/.cargo/bin/gnostr ]; then
            chmod +x "$HOME/.cargo/bin/gnostr"
            GNOSTR_CMD="$HOME/.cargo/bin/gnostr"
          else
            GNOSTR_CMD="cargo run --bin gnostr --"
          fi

          $GNOSTR_CMD \
            -d ${{ env.POW }} \
            -r ${{ env.DAMUS }} \
            --nsec "$(gnostr-sha256)" \
            set-metadata \
            -n gnostr \
            -a gnostr://$(gnostr-weeble)/$(gnostr-blockheight) \
            -p "https://avatars.githubusercontent.com/u/135379339?s=400&u=11cb72cccbc2b13252867099546074c50caef1ae&v=4" \
            -b "https://raw.githubusercontent.com/gnostr-org/gnostr-icons/refs/heads/master/banner/1024x341.png" || true
      - run: |
          if [ -f target/debug/gnostr ]; then
            chmod +x ./target/debug/gnostr
            GNOSTR_CMD=./target/debug/gnostr
          elif [ -f ~/.cargo/bin/gnostr ]; then
            chmod +x "$HOME/.cargo/bin/gnostr"
            GNOSTR_CMD="$HOME/.cargo/bin/gnostr"
          else
            GNOSTR_CMD="cargo run --bin gnostr --"
          fi

          $GNOSTR_CMD ngit --nsec $(gnostr-sha256) fetch
      - run: |
          if [ -f target/debug/gnostr ]; then
            chmod +x ./target/debug/gnostr
            GNOSTR_CMD=./target/debug/gnostr
          elif [ -f ~/.cargo/bin/gnostr ]; then
            chmod +x "$HOME/.cargo/bin/gnostr"
            GNOSTR_CMD="$HOME/.cargo/bin/gnostr"
          else
            GNOSTR_CMD="cargo run --bin gnostr --"
          fi

          EVENT=$($GNOSTR_CMD \
            --nsec $(gnostr-sha256) \
            -d ${{ env.POW }} \
            -r ${{ env.DAMUS }} \
            -r ${{ env.NOS }} \
            custom-event \
            -k 1 \
            -c "$(gnostr-weeble)/$(gnostr-blockheight)/$(gnostr-wobble)" \
            -t "a|blah" \
            -t "a|$(date +%s)" \
            -t "$(gnostr-weeble)" \
            -t "$(gnostr-blockheight)" \
            -t "$(gnostr-wobble)" \
            --hex || true) && \
            export EVENT=$EVENT && \
            NOTE=$($GNOSTR_CMD convert-key -p note -k $EVENT || true) || true && \
            export NOTE=$NOTE && echo $NOTE && echo $EVENT && \
            curl https://njump.me/$NOTE
      - run: |
          set -euo pipefail

          SENDER_HASH="$(printf '%s' sender | sha256sum | cut -d' ' -f1)"
          END_AT=$((SECONDS + 120))
          COUNT=0

          if [ -f target/debug/gnostr ]; then
            chmod +x ./target/debug/gnostr
            GNOSTR_CMD=./target/debug/gnostr
          elif [ -f ~/.cargo/bin/gnostr ]; then
            chmod +x "$HOME/.cargo/bin/gnostr"
            GNOSTR_CMD="$HOME/.cargo/bin/gnostr"
          else
            GNOSTR_CMD="cargo run --bin gnostr --"
          fi

          echo "Pushing oneshot chat messages for 2 minutes..."
          while [ "$SECONDS" -lt "$END_AT" ]; do
            COUNT=$((COUNT + 1))
            MESSAGE="Hello from github-ci-sender #${COUNT} at $(date +%s)"
            $GNOSTR_CMD chat \
              --debug \
              --name sender \
              --hash "$SENDER_HASH" \
              --topic gnostr \
              --oneshot "$MESSAGE"
            sleep 5
          done

          echo "Finished pushing ${COUNT} oneshot messages."

      - name: Save rustup
        id: cache-rustup-save
        uses: actions/cache/save@v4
        if: ${{ !env.ACT && steps.cache-rustup-restore.outputs.cache-hit != 'true' }}
        with:
          path: |
            ~/.rustup
          key: ${{ steps.cache-rustup-restore.outputs.cache-primary-key }}

      - name: Save cargo
        id: cache-cargo-save
        uses: actions/cache/save@v4
        if: ${{ !env.ACT && steps.cache-cargo-restore.outputs.cache-hit != 'true' }}
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ steps.cache-cargo-restore.outputs.cache-primary-key }}

      - name: Save target
        id: cache-target-save
        uses: actions/cache/save@v4
        if: ${{ !env.ACT && steps.cache-target-restore.outputs.cache-hit != 'true' }}
        with:
          path: |
            target
          key: ${{ steps.cache-target-restore.outputs.cache-primary-key }}

      - name: Cleanup lingering gnostr processes
        uses: ./.github/actions/gnostr-cleanup
        continue-on-error: true
