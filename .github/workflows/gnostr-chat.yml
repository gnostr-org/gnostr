---
name: Gnostr Chat

on:
  workflow_run:
    workflows:
      - gnostr-test-matrix
    types:
      - completed
  workflow_dispatch:
  repository_dispatch:
    types: [run-gnostr-chat-workflow]
  push:
    branches:
      - "**"

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  gnostr-chat:
    name: Gnostr Chat
    env:
      FORCE: "--force"
      GNOSTR: "gnostr"
      POW: "16"
      DAMUS: "wss://relay.damus.io"
      NOS: "wss://nos.lol"
    strategy:
      matrix:
        os: [ubuntu-latest] # macos, ubuntu, windows
        rustup: [stable, nightly]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: echo test
        run: |
          echo GNOSTR=${{ env.GNOSTR }}
          echo MEMPOOL=${{ env.MEMPOOL }}
          echo POW=${{ env.POW }}
          echo DAMUS=${{ env.DAMUS }}
          echo NOS=${{ env.NOS }}
          printenv
        env:
          MEMPOOL: "mempool"
          MEMPOOL_SPACE: "mempool-space"

      - uses: styfle/cancel-workflow-action@0.11.0
        if: ${{ env.ACT == 'false' }}
        with:
          access_token: ${{ github.token }}

      - name: Restore rustup
        id: cache-rustup-restore
        uses: actions/cache/restore@v4
        if: ${{ !env.ACT }}
        with:
          path: |
            ~/.rustup
          key: ${{ runner.os }}-rustup-${{ matrix.rustup }}

      - name: Restore cargo
        id: cache-cargo-restore
        uses: actions/cache/restore@v4
        if: ${{ !env.ACT }}
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-git-${{ runner.os }}-${{ matrix.rustup }}-${{ hashFiles('Cargo.lock') }}

      - name: Restore target
        id: cache-target-restore
        uses: actions/cache/restore@v4
        if: ${{ !env.ACT }}
        with:
          path: |
            target
          key: cargo-build-target-${{ runner.os }}-${{ matrix.rustup }}-${{ hashFiles('Cargo.lock') }}

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # You can specify a toolchain channel (stable, beta, nightly) or a specific version (e.g., '1.70.0').
          # If not specified, it defaults to 'stable'. 
          # It can also read the version from a 'rust-toolchain.toml' file if present.
          toolchain: ${{ matrix.rustup }}
          # Comma-separated list of additional components to install.
          components: clippy, rustfmt
          # Automatically configure smart caching (recommended for speed)
          cache: true

      - uses: actions/checkout@v3
        with:
          submodules: 'true'
          set-safe-directory: 'true'
          fetch-depth: '0'
          fetch-tags: 'false'
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - run: rustup default ${{ matrix.rustup }}
      - run: cargo build --bin gnostr
      - run: ./target/debug/gnostr --help
      - run: |
          ./target/debug/gnostr \
            -d ${{ env.POW }} \
            -r ${{ env.DAMUS }} \
            --nsec "$(gnostr-sha256)" \
            set-metadata \
            -n gnostr \
            -a gnostr://$(gnostr-weeble)/$(gnostr-blockheight) \
            -p "https://avatars.githubusercontent.com/u/135379339?s=400&u=11cb72cccbc2b13252867099546074c50caef1ae&v=4" \
            -b "https://raw.githubusercontent.com/gnostr-org/gnostr-icons/refs/heads/master/banner/1024x341.png" || true
      - run: |
          ./target/debug/gnostr ngit --nsec $(gnostr-sha256) fetch
      - run: |
          EVENT=$(./target/debug/gnostr \
            --nsec $(gnostr-sha256) \
            -d ${{ env.POW }} \
            -r ${{ env.DAMUS }} \
            -r ${{ env.NOS }} \
            custom-event \
            -k 1 \
            -c "$(gnostr-weeble)/$(gnostr-blockheight)/$(gnostr-wobble)" \
            -t "a|blah" \
            -t "a|$(date +%s)" \
            -t "$(gnostr-weeble)" \
            -t "$(gnostr-blockheight)" \
            -t "$(gnostr-wobble)" \
            --hex || true) && \
            export EVENT=$EVENT && \
            NOTE=$(gnostr convert-key -p note -k $EVENT || true) || true && \
            export NOTE=$NOTE && echo $NOTE && echo $EVENT && \
            curl https://njump.me/$NOTE
      - run: |
          LISTENER_HASH="$(printf '%s' listener | sha256sum | cut -d' ' -f1)"
          SENDER_HASH="$(printf '%s' sender | sha256sum | cut -d' ' -f1)"

          ./target/debug/gnostr chat \
            --headless \
            --debug \
            --name listener \
            --hash "$LISTENER_HASH" \
            --topic gnostr \
            > listener_output.log 2>&1 &

          echo "Listener started"
          sleep 10 # Give the listener time to detach and discover peers

          MESSAGE="Hello from github-ci-sender at $(date +%s)"
          ./target/debug/gnostr chat \
            --debug \
            --name sender \
            --hash "$SENDER_HASH" \
            --topic gnostr \
            --oneshot "$MESSAGE"

          sleep 10 # Give the network time to propagate the oneshot message

          echo "Checking listener output..."
          cat listener_output.log
          if grep -Fq "mDNS discovered a new peer" listener_output.log && grep -Fq "$MESSAGE" listener_output.log; then
            echo "Test passed: Listener detected the peer and message."
          else
            echo "Test failed: Listener did not detect the peer or message."
            exit 1
          fi

      - name: Save rustup
        id: cache-rustup-save
        uses: actions/cache/save@v4
        if: ${{ !env.ACT && steps.cache-rustup-restore.outputs.cache-hit != 'true' }}
        with:
          path: |
            ~/.rustup
          key: ${{ steps.cache-rustup-restore.outputs.cache-primary-key }}

      - name: Save cargo
        id: cache-cargo-save
        uses: actions/cache/save@v4
        if: ${{ !env.ACT && steps.cache-cargo-restore.outputs.cache-hit != 'true' }}
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ steps.cache-cargo-restore.outputs.cache-primary-key }}

      - name: Save target
        id: cache-target-save
        uses: actions/cache/save@v4
        if: ${{ !env.ACT && steps.cache-target-restore.outputs.cache-hit != 'true' }}
        with:
          path: |
            target
          key: ${{ steps.cache-target-restore.outputs.cache-primary-key }}

      - name: Cleanup lingering gnostr processes
        uses: ./.github/actions/gnostr-cleanup
        continue-on-error: true







  tui:
    name: TUI Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rustup: [stable, nightly]
      fail-fast: false
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Restore rustup
        id: cache-rustup-restore
        uses: actions/cache/restore@v4
        if: ${{ !env.ACT }}
        with:
          path: |
            ~/.rustup
          key: ${{ runner.os }}-rustup-${{ matrix.rustup }}

      - name: Restore cargo
        id: cache-cargo-restore
        uses: actions/cache/restore@v4
        if: ${{ !env.ACT }}
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-git-${{ runner.os }}-${{ matrix.rustup }}-${{ hashFiles('Cargo.lock') }}

      - name: Restore target
        id: cache-target-restore
        uses: actions/cache/restore@v4
        if: ${{ !env.ACT }}
        with:
          path: |
            target
          key: cargo-build-target-${{ runner.os }}-${{ matrix.rustup }}-${{ hashFiles('Cargo.lock') }}

      - uses: actions/checkout@v4
        with:
          submodules: 'true'
          set-safe-directory: 'true'
          fetch-depth: '0'
          fetch-tags: 'false'
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rustup }}
          components: clippy, rustfmt
          cache: true
      - name: Run gnostr tui
        run: |
          ./target/debug/gnostr tui &
          sleep 10
          pkill -f gnostr

      - name: Save rustup
        id: cache-rustup-save
        uses: actions/cache/save@v4
        if: ${{ !env.ACT && steps.cache-rustup-restore.outputs.cache-hit != 'true' }}
        with:
          path: |
            ~/.rustup
          key: ${{ steps.cache-rustup-restore.outputs.cache-primary-key }}

      - name: Save cargo
        id: cache-cargo-save
        uses: actions/cache/save@v4
        if: ${{ !env.ACT && steps.cache-cargo-restore.outputs.cache-hit != 'true' }}
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ steps.cache-cargo-restore.outputs.cache-primary-key }}

      - name: Save target
        id: cache-target-save
        uses: actions/cache/save@v4
        if: ${{ !env.ACT && steps.cache-target-restore.outputs.cache-hit != 'true' }}
        with:
          path: |
            target
          key: ${{ steps.cache-target-restore.outputs.cache-primary-key }}
