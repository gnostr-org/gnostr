name: cargo-cross

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release"
        required: true
        type: string
      toolchain:
        description: "Rust toolchain to use"
        required: false
        default: stable
        type: choice
        options:
          - stable
          - nightly

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      release_tag: ${{ steps.set-matrix.outputs.release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref_name }}

      - id: set-matrix
        shell: python3 {0}
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          import json
          import os
          import subprocess

          metadata = json.loads(subprocess.check_output(
              ["cargo", "metadata", "--no-deps", "--format-version", "1"],
              text=True,
          ))

          packages = []
          for package in metadata["packages"]:
              packages.append({
                  "name": package["name"],
                  "version": package["version"],
                  "manifest_path": package["manifest_path"],
              })

          packages.sort(key=lambda item: item["name"])

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"release_tag={os.environ['RELEASE_TAG']}\n")
              output.write(f"matrix={json.dumps({'include': packages})}\n")

  package-crates:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      BUILD_NAME: ${{ matrix.name }}-${{ matrix.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          ref: ${{ needs.setup.outputs.release_tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.toolchain || 'stable' }}

      - name: Package crate
        shell: bash
        run: |
          set -euo pipefail

          cargo package \
            --allow-dirty \
            --no-verify \
            --locked \
            --manifest-path "${{ matrix.manifest_path }}"

          mkdir -p "artifacts/$BUILD_NAME"
          cp "target/package/${{ matrix.name }}-${{ matrix.version }}.crate" "artifacts/$BUILD_NAME/"
          (cd "artifacts/$BUILD_NAME" && sha256sum *.crate > SHA256SUMS)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: artifacts/${{ env.BUILD_NAME }}

  create-github-release:
    needs: [setup, package-crates]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          ref: ${{ needs.setup.outputs.release_tag }}

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        shell: bash
        run: |
          release_tag="${{ needs.setup.outputs.release_tag }}"
          release_commit="$(git rev-parse HEAD)"
          prerelease_flag=""
          if [[ "$release_tag" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "$release_tag" \
            --target "$release_commit" \
            --title "$release_tag" \
            --generate-notes \
            $prerelease_flag \
            artifacts/*/*.crate \
            artifacts/*/SHA256SUMS
