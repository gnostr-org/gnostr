name: build-artifact

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      os:
        description: 'OS / target to build (select "all" to build every target)'
        required: false
        default: 'all'
        type: string
  workflow_dispatch:
    inputs:
      os:
        description: 'OS / target to build (select "all" to build every target)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - linux-x64
          - linux-x64-musl
          - linux-arm64
          - linux-arm64-musl
          - windows-x64
          - macos-x64
          - macos-arm64

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: python3 {0}
        run: |
          import json, os

          ALL_TARGETS = [
            {"build": "linux-x64",       "os": "ubuntu-latest",  "target": "x86_64-unknown-linux-gnu",    "native": True},
            {"build": "linux-x64-musl",  "os": "ubuntu-latest",  "target": "x86_64-unknown-linux-musl",   "native": False},
            {"build": "linux-arm64",     "os": "ubuntu-latest",  "target": "aarch64-unknown-linux-gnu",   "native": False},
            {"build": "linux-arm64-musl","os": "ubuntu-latest",  "target": "aarch64-unknown-linux-musl",  "native": False},
            {"build": "windows-x64",     "os": "windows-latest", "target": "x86_64-pc-windows-msvc",      "native": True},
            {"build": "macos-x64",       "os": "macos-15-intel", "target": "x86_64-apple-darwin",         "native": True},
            {"build": "macos-arm64",     "os": "macos-latest",   "target": "aarch64-apple-darwin",        "native": True},
          ]

          selected = "${{ inputs.os }}" or "all"
          targets = ALL_TARGETS if selected == "all" else [t for t in ALL_TARGETS if t["build"] == selected]
          matrix = {"build": [t["build"] for t in targets], "include": targets}

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"matrix={json.dumps(matrix)}\n")

  build-artifacts:
    needs: setup
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 50

    - name: Set build name
      shell: bash
      run: |
        SAFE_REF="${GITHUB_REF_NAME//\//-}"
        echo "BUILD_NAME=gnostr-${SAFE_REF}-${{ matrix.target }}" >> "$GITHUB_ENV"

    - name: Fetch tags
      run: git fetch --tags --force

    - name: Restore Cache
      uses: actions/cache/restore@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-cargo-

    - name: Install Linux system dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libssl-dev \
          pkg-config \
          musl-tools \
          build-essential \
          llvm-dev \
          libclang-dev \
          clang \
          clang-5.0 \
          libclang-5.0-dev || sudo apt-get install -y libclang-dev

    - name: Install macOS system dependencies
      if: runner.os == 'macOS'
      run: |
        brew update

    - name: Install Windows system dependencies
      if: runner.os == 'Windows'
      run: |
        echo "TODO: install Windows specific deps if neccesary"

    - name: Verify Xcode Command Line Tools
      if: runner.os == 'macOS'
      run: xcode-select -p

    - name: Install cross
      uses: taiki-e/install-action@v2
      with:
        tool: cross

    - name: Set Clang Environment Variables
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Linux" ]]; then
          # Prefer the latest libclang available to avoid 3.8 panic
          SO_PATH=$(find /usr/lib -name "libclang.so.1*" | sort -V | tail -n 1)
          if [ -n "$SO_PATH" ]; then
            LIB_DIR=$(dirname "$SO_PATH")
            echo "LIBCLANG_PATH=$LIB_DIR" >> $GITHUB_ENV
            echo "Using LIBCLANG_PATH: $LIB_DIR"
          fi
          
          # Force Clang resource directory for internal headers (stdarg.h)
          CLANG_RES_DIR=$(clang -print-resource-dir)
          echo "BINDGEN_EXTRA_CLANG_ARGS=-I${CLANG_RES_DIR}/include" >> $GITHUB_ENV
          echo "Using BINDGEN_EXTRA_CLANG_ARGS: -I${CLANG_RES_DIR}/include"
        fi
        echo $GITHUB_ENV && printenv

    - name: Build release binary
      shell: bash
      run: |
        if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
          cargo build --verbose --release --locked --target ${{ matrix.target }} -p blossom-server -p blossom-cli
        fi
        if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-gnu" ]]; then
          cargo build --verbose --release --locked --target ${{ matrix.target }} -p gnostr
        else
          # Pass clang variables through to the cross container
          cross build --verbose --release --locked --target ${{ matrix.target }} -p gnostr
        fi

    - name: Save Cache
      if: always() # This ensures cache is saved on failure, success, or cancel
      uses: actions/cache/save@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        # We use a unique key (adding run_id) so we don't collide with existing immutable keys
        key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ github.run_id }}

    - name: Bundle release (Unix)
      if: matrix.build != 'windows-x64'
      shell: bash
      run: |
        mkdir -p "$BUILD_NAME"
        cp README.md LICENSE "$BUILD_NAME/"
        ls "target/
        ls "target/${{ matrix.target }}
        cp "target/${{ matrix.target }}/release/gnostr-tui" "$BUILD_NAME/"
        cp "target/${{ matrix.target }}/release/gnostr-blossom" "$BUILD_NAME/"

    - name: Bundle release (Windows)
      if: matrix.build == 'windows-x64'
      shell: bash
      run: |
        mkdir -p "$BUILD_NAME"
        cp README.md LICENSE "$BUILD_NAME/"
        cp "target/${{ matrix.target }}/release/gnostr-tui.exe" "$BUILD_NAME/"
        cp "target/${{ matrix.target }}/release/gnostr-blossom.exe" "$BUILD_NAME/"

    - name: Run smoke test (Unix)
      if: matrix.native && matrix.build != 'windows-x64'
      shell: bash
      run: |
        "$BUILD_NAME/gnostr-tui" --version
        "$BUILD_NAME/gnostr-blossom" --version

    - name: Run smoke test (Windows)
      if: matrix.native && matrix.build == 'windows-x64'
      shell: bash
      run: |
        "$BUILD_NAME/gnostr-tui.exe" --version
        "$BUILD_NAME/gnostr-blossom.exe" --version

    - name: Upload asset
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.BUILD_NAME }}
        path: ${{ env.BUILD_NAME }}
