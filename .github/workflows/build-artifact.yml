name: build-artifact
on:
  workflow_call:
  workflow_dispatch:
    inputs:
      os:
        description: 'OS / target to build (select "all" to build every target)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - linux-x64
          - linux-x64-musl
          - linux-arm64
          - linux-arm64-musl
          - windows-x64
          - macos-x64
          - macos-arm64

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: python3 {0}
        run: |
          import json, os

          ALL_TARGETS = [
            {"build": "linux-x64",       "os": "ubuntu-latest",  "target": "x86_64-unknown-linux-gnu",    "native": True},
            #{"build": "linux-x64-musl",  "os": "ubuntu-latest",  "target": "x86_64-unknown-linux-musl",   "native": False},
            #{"build": "linux-arm64",     "os": "ubuntu-latest",  "target": "aarch64-unknown-linux-gnu",   "native": False},
            #{"build": "linux-arm64-musl","os": "ubuntu-latest",  "target": "aarch64-unknown-linux-musl",  "native": False},
            {"build": "windows-x64",     "os": "windows-latest", "target": "x86_64-pc-windows-msvc",      "native": True},
            {"build": "macos-x64",       "os": "macos-15-intel", "target": "x86_64-apple-darwin",         "native": True},
            {"build": "macos-arm64",     "os": "macos-latest",   "target": "aarch64-apple-darwin",        "native": True},
          ]

          selected = "${{ inputs.os }}" or "all"
          targets = ALL_TARGETS if selected == "all" else [t for t in ALL_TARGETS if t["build"] == selected]
          matrix = {"build": [t["build"] for t in targets], "include": targets}

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"matrix={json.dumps(matrix)}\n")

  build-artifacts:
    needs: setup
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 50

    - name: Set build name
      shell: bash
      run: |
        SAFE_REF="${GITHUB_REF_NAME//\//-}"
        echo "BUILD_NAME=gnostr-${SAFE_REF}-${{ matrix.target }}" >> "$GITHUB_ENV"

    - name: Fetch tags
      run: git fetch --tags --force

    - name: Cache
      uses: actions/cache@v4
      with:
        path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
        key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}


    - name: Install Dependencies (Cross-Platform)
      shell: pwsh
      run: |
        if ($IsWindows) {
          Write-Host "Detected Windows Runner. Ensuring LLVM/Clang availability..."
          # GitHub Windows runners usually have LLVM/Clang pre-installed.
          # If not found, we install it via Chocolatey.
          if (!(Get-Command clang -ErrorAction SilentlyContinue)) {
            choco install llvm -y
          }
          # Add GCC/MinGW if specifically required for the BIP-64MOD context
          if (!(Get-Command gcc -ErrorAction SilentlyContinue)) {
            choco install mingw -y
          }
        } else {
          Write-Host "Detected Linux Runner. Using apk..."
          # This only runs if you switch the 'runs-on' to an Alpine-based container
          if (Get-Command apk -ErrorAction SilentlyContinue) {
            apk add build-base clang llvm-dev libclang clang-dev libc-dev || true
          }
        }

    - name: Install Linux system dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update || true
        sudo apt-get install -y libssl-dev pkg-config musl-tools build-essential clang libclang-dev || true

    - name: Install Dependencies
      shell: pwsh
      run: |
        if ($IsWindows) {
          # Windows runners usually have LLVM pre-installed, 
          # but this ensures it's available via Chocolatey if needed.
          if (!(Get-Command clang -ErrorAction SilentlyContinue)) {
            choco install llvm -y
          }
          Write-Host "Running on Windows: LLVM/Clang is ready."
        } else {
          # This part will only execute if the shell is running on Linux/Alpine
          # apk add build-base clang llvm-dev libclang clang-dev libc-dev || true
        }

    - name: Build Project
      shell: pwsh
      run: |
        # Your build command here
        echo "Building $env:BUILD_NAME"
      env:
        BUILD_NAME: gnostr-1879-944781-779852-ae92259bee-90c5183493-x86_64-pc-windows-msvc

    - name: Install build dependencies
      run: apk add build-base clang llvm-dev libclang clang-dev libc-dev || true

    - name: Install Xcode Command Line Tools
      run: xcode-select --install || true

    - name: Install cross
      uses: taiki-e/install-action@v2
      with:
        tool: cross

    - name: Install sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Build release binary
      env:
        RUSTC_WRAPPER: sccache
      run: cross build --verbose --release --locked --target ${{ matrix.target }}

    - name: Bundle release (Unix)
      if: matrix.build != 'windows-x64'
      shell: bash
      run: |
        mkdir -p "$BUILD_NAME"
        cp README.md LICENSE "$BUILD_NAME/"
        cp "target/${{ matrix.target }}/release/gnostr" "$BUILD_NAME/"

    - name: Bundle release (Windows)
      if: matrix.build == 'windows-x64'
      shell: bash
      run: |
        mkdir -p "$BUILD_NAME"
        cp README.md LICENSE "$BUILD_NAME/"
        cp "target/${{ matrix.target }}/release/gnostr.exe" "$BUILD_NAME/"

    - name: Run smoke test (Unix)
      if: matrix.native && matrix.build != 'windows-x64'
      shell: bash
      run: |
        "$BUILD_NAME/gnostr" --version

    - name: Run smoke test (Windows)
      if: matrix.native && matrix.build == 'windows-x64'
      shell: bash
      run: |
        "$BUILD_NAME/gnostr.exe" --version

    - name: Upload asset
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.BUILD_NAME }}
        path: ${{ env.BUILD_NAME }}
