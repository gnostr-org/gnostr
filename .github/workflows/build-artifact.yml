name: build-artifact

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:
  workflow_run:
    workflows:
      - gnostr-test-matrix
    types:
      - completed
  workflow_call:
    inputs:
      os:
        description: "OS / target to build (select \"all\" to build every target)"
        required: false
        default: all
        type: string
      toolchain:
        description: "Rust toolchain to use"
        required: false
        default: stable
        type: string
  workflow_dispatch:
    inputs:
      os:
        description: "OS / target to build (select \"all\" to build every target)"
        required: false
        default: all
        type: choice
        options:
          - all
          - linux-x64
          - linux-x64-musl
          - linux-arm64
          - linux-arm64-musl
          - windows-x64
          - macos-x64
          - macos-arm64
      toolchain:
        description: "Rust toolchain to use"
        required: false
        default: stable
        type: choice
        options:
          - stable
          - nightly

permissions:
  contents: read

jobs:
  setup:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: python3 {0}
        env:
          SELECTED_OS: ${{ inputs.os || 'all' }}
          SELECTED_TOOLCHAIN: ${{ inputs.toolchain || 'stable' }}
        run: |
          import json
          import os

          all_targets = [
              {"build": "linux-x64", "os": "ubuntu-latest", "target": "x86_64-unknown-linux-gnu", "native": True, "features": ""},
              {"build": "linux-x64-musl", "os": "ubuntu-latest", "target": "x86_64-unknown-linux-musl", "native": False, "features": "vendored-openssl"},
              {"build": "linux-arm64", "os": "ubuntu-latest", "target": "aarch64-unknown-linux-gnu", "native": False, "features": ""},
              {"build": "linux-arm64-musl", "os": "ubuntu-latest", "target": "aarch64-unknown-linux-musl", "native": False, "features": "vendored-openssl"},
              {"build": "windows-x64", "os": "windows-latest", "target": "x86_64-pc-windows-msvc", "native": True, "features": ""},
              {"build": "macos-x64", "os": "macos-15-intel", "target": "x86_64-apple-darwin", "native": True, "features": ""},
              {"build": "macos-arm64", "os": "macos-latest", "target": "aarch64-apple-darwin", "native": True, "features": ""},
          ]

          selected = os.environ["SELECTED_OS"] or "all"
          toolchain = os.environ["SELECTED_TOOLCHAIN"] or "stable"
          targets = all_targets if selected == "all" else [target for target in all_targets if target["build"] == selected]
          matrix = {
              "build": [target["build"] for target in targets],
              "include": [{**target, "toolchain": toolchain} for target in targets],
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps(matrix)}\n")

  build-artifacts:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    needs: setup
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set build name
        uses: ./.github/actions/set-build-name
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.target }}

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.toolchain }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Install cross
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Set Clang environment variables
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if command -v llvm-config >/dev/null 2>&1; then
            lib_dir="$(llvm-config --libdir)"
          else
            so_path="$(find /usr /usr/local -name 'libclang.so*' 2>/dev/null | sort -V | tail -n 1)"
            lib_dir="$(dirname "$so_path")"
          fi

          if [ -n "${lib_dir:-}" ] && [ -d "$lib_dir" ]; then
            clang_resource_dir="$(clang -print-resource-dir)"
            gcc_include_dir="$(gcc -print-file-name=include)"
            echo "LIBCLANG_PATH=$lib_dir" >> "$GITHUB_ENV"
            echo "BINDGEN_EXTRA_CLANG_ARGS=-I${clang_resource_dir}/include -isystem ${gcc_include_dir}" >> "$GITHUB_ENV"
          fi

      - name: Build release binary
        shell: bash
        run: |
          args=(
            --target "${{ matrix.target }}"
            --all-features
            --verbose
          )

          if [ -n "${{ matrix.features }}" ]; then
            args+=(--features "${{ matrix.features }}")
          fi

          ./scripts/cross.sh "${args[@]}"

      - name: Bundle release
        shell: bash
        run: |
          mkdir -p "$BUILD_NAME"
          cp README.md LICENSE "$BUILD_NAME/"

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/gnostr-blossom.exe" "$BUILD_NAME/"
            cp "target/${{ matrix.target }}/release/gnostr-server.exe" "$BUILD_NAME/"
          else
            cp "target/${{ matrix.target }}/release/gnostr-blossom" "$BUILD_NAME/"
            cp "target/${{ matrix.target }}/release/gnostr-server" "$BUILD_NAME/"
          fi

      - name: Smoke test
        if: matrix.native == true
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            "$BUILD_NAME/gnostr-blossom.exe" --version
            "$BUILD_NAME/gnostr-server.exe" --version
          else
            "$BUILD_NAME/gnostr-blossom" --version
            "$BUILD_NAME/gnostr-server" --version
          fi

      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: ${{ env.BUILD_NAME }}

  publish-ghcr-images:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/gnostr-org/gnostr
            file: docker/Dockerfile.gnostr
          - image: ghcr.io/gnostr-org/gnostr-node
            file: docker/Dockerfile.gnostr-node
          - image: ghcr.io/gnostr-org/blossom-server
            file: docker/Dockerfile.blossom-server
          - image: ghcr.io/gnostr-org/blossom-git
            file: docker/Dockerfile.blossom-git
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 50
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.event.workflow_run.head_sha || github.sha }}
