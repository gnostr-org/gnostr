name: gnostr-bot-matrix

concurrency:
  group: gnostr-bot-matrix-${{ github.ref }}
  cancel-in-progress: true

# Controls when the action will run.
on:
  #schedule:
  #  - cron: '*/30 * * * *' # run 30th minute
  push:
    branches:
      - '**'
  workflow_dispatch:
permissions:
  actions: read
  contents: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  gnostr-bot:
    env:
      FORCE: "--force"
      GNOSTR: "gnostr"
      POW: "16"
      DAMUS: "wss://relay.damus.io"
      NOS: "wss://nos.lol"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel]
        rustup: [stable, nightly]
        #commands: [""]  # , "sniper", "chat", "legit", "ngit", "set-metadata", "note"]
      fail-fast: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
          set-safe-directory: 'true'
          fetch-depth: '0'
          fetch-tags: 'false'

      - name: Run sccache-cache only on non-release runs
        if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set Rust caching env vars only on non-release runs
        if: github.event_name != 'release' && github.event_name != 'workflow_dispatch'
        run: |
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          # echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV

      - name: Use Bash for all subsequent steps
        shell: bash
        run: |
          echo GNOSTR=${{ env.GNOSTR }}
          echo MEMPOOL=${{ env.MEMPOOL }}
          echo POW=${{ env.POW }}
          echo DAMUS=${{ env.DAMUS }}
          echo NOS=${{ env.NOS }}
        env:
          MEMPOOL: "mempool"
          MEMPOOL_SPACE: "mempool-space"

      - name: Setup OpenSSL and Perl for Windows
        if: runner.os == 'windows'
        uses: ./.github/actions/setup-openssl-perl-windows/
      - uses: cargo-bins/cargo-binstall@main
      - uses: styfle/cancel-workflow-action@0.11.0
        if: ${{ !env.ACT }}
        with:
          access_token: ${{ github.token }}

      ##- name: Restore rustup
      ##  id: cache-rustup-restore
      ##  uses: actions/cache/restore@v3
      ##  if: ${{ !env.ACT }}
      ##  with:
      ##    path: |
      ##      ~/.rustup
      ##    key: ${{ runner.os }}-rustup-${{ matrix.rustup }}

      - name: Restore cargo
        id: cache-cargo-restore
        uses: actions/cache/restore@v3
        if: ${{ !env.ACT }}
        with:
          path: |
            ~/.cargo
          key: ${{ runner.os }}-cargo-${{ matrix.rustup }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rustup }}
          components: rustfmt, clippy

      - run: |
          rustup default ${{ matrix.rustup }}

      - name: Restore target
        if: ${{ !env.ACT }}
        id: cache-target-restore
        uses: actions/cache/restore@v3
        with:
          path: |
            target
          key: ${{ runner.os }}-target-${{ matrix.rustup }}

      - name: Calculate Odd/Even Status
        id: time_check_hour
        uses: ./.github/actions/calculate-odd-even

      - run: |
          printenv || true

      - run: |
          make || true

      - run: |
          cargo search gnostr --limit 100

      - run: |
          cargo install cargo-binstall -j8 || cargo binstall cargo-binstall -f || true

      - run: |
          cargo-binstall --force --no-confirm gnostr

      - name: gnostr --help
        shell: bash
        run: |
          gnostr --help

      - name: gnostr --version
        shell: bash
        run: |
          gnostr --version

      - name: gnostr generate-keypair
        shell: bash
        run: |
          gnostr generate-keypair

      #- name: gnostr
      #  shell: bash
      #  run: |
      #    gnostr || true

      - run: /bin/bash -c "sudo apt-get install build-essential procps curl file git"
        if: matrix.os == 'ubuntu-latest'

      #- run: cargo install sccache --force -j8
      #  if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'

      #- name: winget install sccache
      #  shell: bash
      #  run: |
      #    winget install Mozilla.sccache --accept-package-agreements --accept-source-agreements
      #  if: runner.os == 'windows'


      - name: brew install
        run: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        if: runner.os != 'windows'

      - name: linuxbrew
        run: |
          test -d ~/.linuxbrew && eval "$(~/.linuxbrew/bin/brew shellenv)"
          test -d /home/linuxbrew/.linuxbrew && eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "eval \"\$($(brew --prefix)/bin/brew shellenv)\"" >> ~/.bashrc
          cargo-binstall --force --no-confirm gnostr && gnostr --help || true
        if: matrix.os == 'ubuntu-latest'

      - name: brew tap gnostr-org/homebrew-gnostr-org
        run: arch -arm64 brew tap gnostr-org/homebrew-gnostr-org || true
        if: runner.os == 'macos'

      - name: brew tap nostorg/nostr
        run: arch -arm64 brew tap nostorg/nostr || true
        if: runner.os == 'macos'

      - name: brew tap randymcmillan/homebrew-randymcmillan
        run: arch -arm64 brew tap randymcmillan/homebrew-randymcmillan || true
        if: runner.os == 'macos'

      - name: Install gnostr via Homebrew
        uses: ./.github/actions/brew-install-gnostr/
        if: runner.os == 'macos'

      - name: Install gnostr via cargo-binstall
        uses: ./.github/actions/cargo-binstall-gnostr
        if: runner.os != 'macOS'

      #- name: gnostr ${{ matrix.commands }}
      #  shell: bash
      #  run: |
      #    gnostr ${{ matrix.commands }} -V
      #    gnostr ${{ matrix.commands }} --version
      #    gnostr ${{ matrix.commands }} -h
      #    gnostr ${{ matrix.commands }} --help

      - name: gnostr --weeble/blockheight/blockhash/wobble
        shell: bash
        run: |
          gnostr-weeble || gnostr --weeble
          gnostr-blockheight || gnostr --blockheight
          gnostr-blockhash || gnostr --blockhash
          gnostr-wobble || gnostr --wobble

      - name: create set-metadata kind 0
        uses: ./.github/actions/gnostr-metadata
        with:
          pow: ${{ env.POW }}
          damus: ${{ env.DAMUS }}
          nos: ${{ env.NOS }}
          p_tag: 'https://avatars.githubusercontent.com/u/135379339?s=400&u=11cb72cccbc2b13252867099546074c50caef1ae&v=4'
          b_tag: 'https://raw.githubusercontent.com/gnostr-org/gnostr-icons/refs/heads/master/banner/1024x341.png'
        #if: matrix.os == 'macos-latest'

      - name: gnostr ngit fetch
        shell: bash
        run: |
          git remote add gitworkshop nostr://npub1ahaz04ya9tehace3uy39hdhdryfvdkve9qdndkqp3tvehs6h8s5slq45hy/gnostr
          gnostr ngit --help
          #gnostr ngit --nsec $(gnostr --hash "") list
          gnostr ngit --nsec $(gnostr --hash "") fetch 2>/dev/null 
        #if: matrix.os == 'macos-latest'

      - name: Create custom-event kind 1
        uses: ./.github/actions/gnostr-custom-event
        with:
          pow: ${{ env.POW }}
          damus: ${{ env.DAMUS }}
          nos: ${{ env.NOS }}
          kind: 1
          content: |
            gnostr bot matrix CI run
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            repository: ${{ github.repository }}
            repository_owner: ${{ github.repository_owner }}
            workflow: ${{ github.workflow }}
            workflow_ref: ${{ github.workflow_ref }}
            run_id: ${{ github.run_id }}
            run_attempt: ${{ github.run_attempt }}
            ref: ${{ github.ref }}
            sha: ${{ github.sha }}
            actor: ${{ github.actor }}
            runner_os: ${{ runner.os }}
            matrix: os=${{ matrix.os }}, rustup=${{ matrix.rustup }}
          tags: 'repo|${{ github.repository }},workflow|${{ github.workflow }},workflow_sha|${{ github.workflow_sha }},workflow_ref|${{ github.workflow_ref }},github_ref|${{ github.ref }},github_run_id|${{ github.run_id }},gnostr|gnostr,gnostr-bot|gnostr-bot,github_repo_owner|${{ github.repository_owner }},runner_env|${{ runner.environment }},runner_os|${{ runner.os }}'
        #if: matrix.os == 'macos-latest'

      - name: 🌙 UTC second is ODD
        if: ${{ steps.time_check_hour.outputs.is_even != 'true' && runner.os != 'windows' }}
        run: |
          cargo clean && echo "✅" || echo "❌"

      - name: 🚀 cargo fmt --check -j8
        #if: ${{ steps.time_check_hour.outputs.is_even == 'true' }}
        run: |
          cargo fmt --check || true && echo "✅" || echo "❌"

      - name: 🚀 cargo install -j8
        #if: ${{ steps.time_check_hour.outputs.is_even == 'true' }}
        shell: bash
        run: |
          cargo install -j8 -f --path . && echo "✅" ## || echo "❌"

      - name: 🖊️ cargo fmt — commit formatting changes after successful build
        if: success() && matrix.os == 'ubuntu-latest' && matrix.rustup == 'stable'
        shell: bash
        run: |
          cargo fmt --all
          if ! git diff --quiet; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -u
            git commit -m "cargo fmt: apply formatting changes [$(git rev-parse --short HEAD)]"
            git push
            echo "✅ Committed cargo fmt changes"
          else
            echo "✅ No formatting changes"
          fi

      - name: 🚀 if command apt-get
        #if: ${{ steps.time_check_hour.outputs.is_even == 'true' }}
        shell: bash
        run: |
          if command -v apt-get &> /dev/null; then \
          sudo apt-get update && \
          sudo apt-get install -y \
          libxcb1-dev \
          libxcb-render0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev; \
          else echo 'apt-get not found, trying yum'; \
          if command -v yum &> /dev/null; \
          then sudo yum install -y libxcb \
          libxcb-devel \
          libxcb-render-devel \
          libxcb-shape-devel \
          libxcb-xfixes-devel; \
          else echo \
          'Neither apt-get nor yum found. Please install libxcb development libraries manually.';\
          fi;\
          fi;
        if: matrix.os != 'windows-latest' && matrix.os != 'macos-latest'

      #- name: 🚀 cargo test
      #  #if: ${{ steps.time_check_hour.outputs.is_even == 'true' }}
      #  shell: bash
      #  run: |
      #    cargo test -j8 -- --nocapture && echo "✅" ## || echo "❌"

      #- name: 🌙 UTC second is ODD
      #  if: ${{ steps.time_check_hour.outputs.is_even != 'true' }}
      #  run: |
      #    cargo test -j8 -- --ignored && echo "✅" || echo "❌"

      - run: |
         make gnostr-chat &
         make gnostr-chat &
         sleep 5 # Wait for services to start
         gnostr query --limit 100 || true

      - name: Cleanup lingering gnostr processes
        uses: ./.github/actions/gnostr-cleanup
        continue-on-error: true

      - name: Get Current Job Log URL
        uses: Tiryoh/gha-jobid-action@v1.4.0
        id: jobs
        if: ${{ !env.ACT }}
        with:
          job_name: "gnostr-bot (${{ matrix.os }}, ${{ matrix.rustup }})" # input job.<job-id>.name and matrix here.
          per_page: 50 # input matrix size here if it is larger than 30
      - name: Output Current Job Log URL
        run: echo ${{ steps.jobs.outputs.html_url }}

      - name: Execute script on failure
        if: failure()
        uses: ./.github/actions/gnostr-notify
        with:
          status: 'Failed!'
          job_url: ${{ steps.jobs.outputs.html_url }}
          matrix_label: '${{ matrix.os }}, ${{ matrix.rustup }}'
          pow: ${{ env.POW }}
          damus: ${{ env.DAMUS }}
          nos: ${{ env.NOS }}
          njump_base: 'http://njump.me'

      - name: Execute script on cancelled
        if: cancelled()
        uses: ./.github/actions/gnostr-notify
        with:
          status: 'Cancelled!'
          job_url: ${{ steps.jobs.outputs.html_url }}
          matrix_label: '${{ matrix.os }}, ${{ matrix.rustup }}'
          pow: ${{ env.POW }}
          damus: ${{ env.DAMUS }}
          nos: ${{ env.NOS }}
          njump_base: 'http://njump.me'

      - name: Execute script on success
        if: success()
        uses: ./.github/actions/gnostr-notify
        with:
          status: 'Success!'
          job_url: ${{ steps.jobs.outputs.html_url }}
          matrix_label: '${{ matrix.os }}, ${{ matrix.rustup }}'
          pow: ${{ env.POW }}
          damus: ${{ env.DAMUS }}
          nos: ${{ env.NOS }}
          njump_base: 'http://njump.me'

      #- name: Save rustup
      #  id: cache-rustup-save
      #  uses: actions/cache/save@v3
      #  if: ${{ !env.ACT }}
      #  with:
      #    path: |
      #      ~/.rustup
      #    key: ${{ steps.cache-rustup-restore.outputs.cache-primary-key }}

      - name: Save cargo
        id: cache-cargo-save
        uses: actions/cache/save@v3
        if: ${{ !env.ACT }}
        with:
          path: |
            ~/.cargo
          key: ${{ steps.cache-cargo-restore.outputs.cache-primary-key }}

      - name: Save target
        id: cache-target-save
        uses: actions/cache/save@v3
        if: ${{ !env.ACT }}
        with:
          path: |
            target
          key: ${{ steps.cache-target-restore.outputs.cache-primary-key }}
