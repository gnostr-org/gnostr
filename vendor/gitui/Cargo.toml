[package]
edition = "2021"
rust-version = "1.88"
name = "gitui"
version = "0.28.1"
authors = ["extrawurst <mail@rusticorn.com>"]
build = "build.rs"
exclude = [
    ".github/*",
    ".vscode/*",
    "assets/*",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "blazing fast terminal-ui for git"
homepage = "https://github.com/gitui-org/gitui"
readme = "README.md"
keywords = [
    "cli",
    "git",
    "gui",
    "terminal",
    "ui",
]
categories = ["command-line-utilities"]
license = "MIT"
repository = "https://github.com/gitui-org/gitui"

[badges.maintenance]
status = "actively-developed"

[features]
default = [
    "ghemoji",
    "regex-fancy",
    "trace-libgit",
    "vendor-openssl",
]
ghemoji = ["gh-emoji"]
regex-fancy = [
    "syntect/regex-fancy",
    "two-face/syntect-fancy",
]
regex-onig = [
    "syntect/regex-onig",
    "two-face/syntect-onig",
]
timing = ["scopetime/enabled"]
trace-libgit = ["asyncgit/trace-libgit"]
vendor-openssl = ["asyncgit/vendor-openssl"]

[lib]
path = "src/lib.rs"

[[bin]]
name = "gitui"
path = "src/main.rs"

