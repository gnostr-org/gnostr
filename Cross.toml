## ]

[target.aarch64-unknown-linux-gnu]
pre-build = [
  # 1. Add architecture and install the HTTPS transport layer immediately
  "dpkg --add-architecture arm64",
  "apt-get update && apt-get install --assume-yes apt-transport-https ca-certificates wget gnupg",

  # 2. Add the LLVM 14 repository using the now-functional HTTPS transport
  "wget -qO /tmp/llvm.key https://apt.llvm.org/llvm-snapshot.gpg.key",
  "apt-key add /tmp/llvm.key",
  "echo 'deb http://apt.llvm.org/xenial/ llvm-toolchain-xenial-14 main' > /etc/apt/sources.list.d/llvm14.list",

  # 3. Final update and installation of cross-toolchain and dependencies
  "apt-get update && apt-get install --assume-yes gcc-aarch64-linux-gnu g++-aarch64-linux-gnu clang-14 libclang-14-dev llvm-14-dev pkg-config build-essential libssl-dev:arm64"
]


[target.aarch64-unknown-linux-gnu.env]
# bindgen runs on x86_64 and needs the native (x86_64) libclang installed above
LIBCLANG_PATH = "/usr/lib/llvm-14/lib"
BINDGEN_EXTRA_CLANG_ARGS = "--sysroot=/usr/aarch64-linux-gnu"
PKG_CONFIG_ALLOW_CROSS = "1"
PKG_CONFIG_PATH_aarch64_unknown_linux_gnu = "/usr/lib/aarch64-linux-gnu/pkgconfig"




[target.aarch64-unknown-linux-musl]
pre-build = [
  "apt-get update && apt-get install --assume-yes clang libclang-dev llvm-dev pkg-config build-essential musl-tools",
]
