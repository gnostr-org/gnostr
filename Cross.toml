[build.env]
# Keep the environment that the current build scripts and bindgen setup already rely on.
passthrough = [
  "BINDGEN_EXTRA_CLANG_ARGS",
  "LIBCLANG_PATH",
  "OPENSSL_DIR",
  "OPENSSL_INCLUDE_DIR",
  "OPENSSL_LIB_DIR",
  "OPENSSL_STATIC",
  "PKG_CONFIG_ALLOW_CROSS",
  "PKG_CONFIG_PATH",
  "PKG_CONFIG_SYSROOT_DIR",
  "CC_aarch64_unknown_linux_gnu",
  "CXX_aarch64_unknown_linux_gnu",
  "CC_aarch64_unknown_linux_musl",
  "CXX_aarch64_unknown_linux_musl",
  "CC_x86_64_unknown_linux_musl",
  "CXX_x86_64_unknown_linux_musl",
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
  "dpkg --add-architecture $CROSS_DEB_ARCH",
  "apt-get update && apt-get install --assume-yes clang libclang-dev llvm-dev pkg-config gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libssl-dev:$CROSS_DEB_ARCH zlib1g-dev:$CROSS_DEB_ARCH",
]

[target.aarch64-unknown-linux-musl]
pre-build = [
  "apt-get update && apt-get install --assume-yes clang libclang-dev llvm-dev pkg-config musl-tools",
]

[target.x86_64-unknown-linux-musl]
pre-build = [
  "apt-get update && apt-get install --assume-yes clang libclang-dev llvm-dev pkg-config musl-tools",
]
