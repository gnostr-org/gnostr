[features]
default = ["blossom", "blossom-tui"]
blossom = []
blossom-tui = ["dep:blossom_tui"]
web = ["dep:gnostr-web", "dep:gnostr-js"]
relay = ["dep:gnostr-relay"]
git = ["dep:gnostr_ngit", "dep:git-version"]
legit = ["dep:gnostr-legit"]
chat = ["dep:gnostr-chat"]
p2p = ["dep:gnostr-p2p"]
crawler = ["dep:gnostr-crawler", "dep:gnostr_filetreelist"]
metrics = []
rate_limiter = []
vendor-openssl = ["gnostr-asyncgit/vendor-openssl", "git2/vendored-openssl"]
vendored-openssl = ["vendor-openssl"]

[dependencies]
actix-web = { workspace = true }
anyhow = { workspace = true }
async-std = { version = "1.12", features = ["attributes"] }
axum = { workspace = true }
blossom_tui = { workspace = true, optional = true }
chrono = "0.4"
clap = { workspace = true }
const_format = "0.2"
crossterm = "0.29"
env_logger = "0.11"
futures = { workspace = true }
futures-util = { workspace = true }
git-version = { version = "0.3.9", optional = true }
git2 = { version = "0.20.4", default-features = false }
gnostr = { path = "..", version = ">=949273.1873.724580" }
gnostr-asyncgit = { package = "gnostr-asyncgit", path = "../asyncgit", features = [
  "tui",
  "vendor-openssl",
], version = ">=949273.1873.724580" }
gnostr-chat = { package = "gnostr-chat", path = "../chat", version = ">=949273.1873.724580", optional = true }
gnostr-crawler = { package = "gnostr-crawler", path = "../crawler", version = ">=949273.1873.724580", optional = true }
gnostr-extensions = { package = "gnostr-extensions", path = "../relay/extensions", version = ">=949273.1873.724580" }
gnostr-git-helpers = { package = "gnostr-git-helpers", path = "../git-helpers", version = ">=949273.1873.724580" }
gnostr-js = { package = "gnostr-js", path = "../js", version = ">=949273.1873.724580", optional = true }
gnostr-legit = { package = "gnostr-legit", path = "../legit", version = ">=949273.1873.724580", optional = true }
gnostr-p2p = { package = "gnostr-p2p", path = "../p2p", version = ">=949273.1873.724580", optional = true }
gnostr-relay = { package = "gnostr-relay", path = "../relay", version = ">=949273.1873.724580", optional = true }
gnostr-web = { package = "gnostr-web", path = "../web", version = ">=949273.1873.724580", optional = true }
gnostr_filetreelist = { package = "gnostr-filetreelist", path = "../filetreelist", version = ">=949273.1873.724580", optional = true }
gnostr_ngit = { package = "gnostr-ngit", path = "../ngit", version = ">=949273.1873.724580", optional = true }
gnostr_qr = { path = "../qr", version = ">=949273.1873.724580" }
libp2p = { workspace = true }
log = { workspace = true }
nips = { path = "../nips", version = ">=949273.1873.724580" }
nostr = { workspace = true }
pretty_env_logger = "0.5.0"
proctitle = "0.1.1"
ratatui = { workspace = true, default-features = false, features = [
  "crossterm",
] }
regex = { workspace = true }
reqwest = { workspace = true }
rustls = { version = "0.23", default-features = false, features = ["ring"] }
secp256k1 = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
serial_test = "2.0.0"
sha2 = { workspace = true }
sha256 = "1.6.0"
simple_logger = { workspace = true }
tempfile = { workspace = true }
time = { workspace = true }
tokio = { workspace = true }
tokio-stream = "0.1.18"
toml = { workspace = true }
tower-http = { workspace = true }
tower-layer = { workspace = true }
tracing = { workspace = true }
tracing-core = { workspace = true }
tracing-subscriber = { workspace = true }
tui-input = "0.14.0"
url = { workspace = true }
walkdir = { workspace = true }
warp = "0.3"
webbrowser = "0.8"

[[example]]
name = "git_tui"
path = "examples/git_tui.rs"
required-features = ["git"]

[[example]]
name = "demo"
path = "examples/demo.rs"
required-features = ["crawler"]

[[example]]
name = "gnostr_crawler"
path = "examples/gnostr_crawler.rs"
required-features = ["crawler"]

[[example]]
name = "gnostr_relay_demo"
path = "examples/gnostr_relay_demo.rs"
required-features = ["relay"]

[[example]]
name = "gnostr_relay_ext_demo"
path = "examples/gnostr_relay_ext_demo.rs"
required-features = ["relay"]
