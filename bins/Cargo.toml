[package]
name = "gnostr-bins"
edition = "2024"
version.workspace = true
exclude.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
actix-web = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }
futures = { workspace = true }
futures-util = { workspace = true }
git2 = { workspace = true }
gnostr-asyncgit = { workspace = true, features = ["tui", "vendor-openssl"] }
gnostr-chat = { workspace = true }
gnostr-crawler = { workspace = true }
gnostr-filetreelist = { workspace = true }
gnostr-git-helpers = { package = "gnostr-git-helpers", path = "../git-helpers" }
gnostr-js = { workspace = true }
gnostr-legit = { workspace = true }
gnostr-p2p = { workspace = true }
gnostr-qr = { workspace = true }
gnostr-relay = { workspace = true }
gnostr-web = { workspace = true }
libp2p = { workspace = true }
log = { workspace = true }
nostr = { workspace = true }
proctitle = "0.1.1"
ratatui = { workspace = true, default-features = false, features = ["crossterm"] }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
simple_logger = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
url = { workspace = true }
