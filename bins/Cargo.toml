[package]
name = "gnostr-bins"
edition = "2024"
version.workspace = true
exclude.workspace = true

[lib]
path = "src/lib.rs"

[features]
default = ["blossom", "blossom-tui"]
blossom = []
blossom-tui = ["dep:blossom_tui"]
metrics = []
rate_limiter = []
vendor-openssl = ["gnostr-asyncgit/vendor-openssl", "git2/vendored-openssl"]
vendored-openssl = ["vendor-openssl"]

[dependencies]
actix-web = { workspace = true }
async-std = { version = "1.12", features = ["attributes"] }
anyhow = { workspace = true }
axum = { workspace = true }
chrono = "0.4"
clap = { workspace = true }
const_format = "0.2"
crossterm = "0.29"
futures = { workspace = true }
futures-util = { workspace = true }
git-version = "0.3.9"
git2 = { version = "0.20.4", default-features = false }
blossom_tui = { workspace = true, optional = true }
gnostr_filetreelist = { package = "gnostr-filetreelist", path = "../filetreelist" }
gnostr-asyncgit = { package = "gnostr-asyncgit", path = "../asyncgit", features = ["tui", "vendor-openssl"] }
gnostr = { path = ".." }
gnostr-chat = { package = "gnostr-chat", path = "../chat" }
gnostr-crawler = { package = "gnostr-crawler", path = "../crawler" }
gnostr-git-helpers = { package = "gnostr-git-helpers", path = "../git-helpers" }
gnostr-js = { package = "gnostr-js", path = "../js" }
gnostr-legit = { package = "gnostr-legit", path = "../legit" }
gnostr-p2p = { package = "gnostr-p2p", path = "../p2p" }
gnostr_qr = { path = "../qr" }
gnostr-relay = { package = "gnostr-relay", path = "../relay" }
gnostr-extensions = { package = "gnostr-extensions", path = "../relay/extensions" }
gnostr-web = { package = "gnostr-web", path = "../web" }
libp2p = { workspace = true }
log = { workspace = true }
ngit = { package = "gnostr-ngit", path = "../ngit" }
nostr = { workspace = true }
nips = { path = "../nips" }
pretty_env_logger = "0.5.0"
proctitle = "0.1.1"
ratatui = { workspace = true, default-features = false, features = ["crossterm"] }
reqwest = { workspace = true }
secp256k1 = { workspace = true }
serial_test = "2.0.0"
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
regex = { workspace = true }
rustls = { version = "0.23", default-features = false, features = ["ring"] }
sha2 = { workspace = true }
sha256 = "1.6.0"
simple_logger = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true }
tracing-core = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
url = { workspace = true }
time = { workspace = true }
tui-input = "0.14.0"
warp = "0.3"
walkdir = { workspace = true }
env_logger = "0.11"
tokio-stream = "0.1.18"
webbrowser = "0.8"
toml = { workspace = true }
tower-layer = { workspace = true }
tower-http = { workspace = true }
