[package]
name = "gnostr-bins"
edition = "2024"
version.workspace = true
description = "gnostr bins and bundled workflow binaries"
license = "MIT"
readme = "../README.md"
homepage = "https://github.com/gnostr-org/gnostr"
repository = "https://github.com/gnostr-org/gnostr.git"
exclude.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "gnostr-tui"
path = "src/bin/gnostr-tui.rs"
required-features = ["blossom-tui"]

[[bin]]
name = "gnostr-nip34"
path = "src/bin/gnostr-nip34.rs"
required-features = ["git"]

