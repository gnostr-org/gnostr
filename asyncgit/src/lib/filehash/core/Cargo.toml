[package]
name = "gnostr_filehash_core"
version = "1876.947089.686958"
edition = "2021"
description = "gnostr filehash core"
license = "MIT"
documentation = "https://github.com/gnostr-org/gnostr"
homepage = "https://github.com/gnostr-org/gnostr"
repository = "https://github.com/gnostr-org/gnostr"
authors = ["gnostr <admin@gnostr.org>"]

[features]
nostr = ["dep:nostr", "dep:nostr-sdk", "dep:serde_json", "dep:sha2", "dep:hex", "dep:reqwest", "dep:tokio", "dep:csv", "dep:url", "dep:frost-secp256k1-tr", "dep:rand"]
frost = ["dep:nostr", "dep:nostr-sdk", "dep:serde_json", "dep:sha2", "dep:hex", "dep:reqwest", "dep:tokio", "dep:csv", "dep:url", "dep:frost-secp256k1-tr", "dep:rand"]

[dependencies]
sha2 = { version = "0.11.0", optional = true }
nostr = { version = "0.44.2", optional = true }
serde_json = { version = "1.0", optional = true }
## remove nostr-sdk deps
## and use gnostr-asyncgit nostr impls
## nostr-sdk = { version = "0.44.0", optional = true }
hex = { version = "0.4.2", optional = true }
csv = { version = "1.3.0", default-features = false, optional = true }
url = { version = "2.5.0", optional = true }
frost-secp256k1-tr = { version = "3.0.0-rc.0", optional = true }
rand = { version = "0.8", optional = true }

[dev-dependencies]
sha2 = "0.11.0"
tempfile = "3.27.0"
nostr = "0.44.2"
## remove nostr-sdk deps
## and use gnostr-asyncgit nostr impls
## nostr-sdk = { version = "0.44.0", optional = true }
serde_json = "1.0"
hex = "0.4.2"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
csv = { version = "1.3.0", default-features = false }
url = "2.5.0"
frost-secp256k1-tr = "3.0.0-rc.0"
serial_test = { version = "3.4.0", features = ["test_logging"] }
log = "0.4"

[build-dependencies]
reqwest = { version = "0.12.0", features = ["json"], optional = true }
tokio = { version = "1", features = ["macros", "rt-multi-thread"], optional = true }
