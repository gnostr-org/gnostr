## [source.crates-io]
## replace-with = "vendored-sources"
## 
## [source."git+https://github.com/DanConwayDev/simple-websockets?branch=auto-release-port"]
## git = "https://github.com/DanConwayDev/simple-websockets"
## branch = "auto-release-port"
## replace-with = "vendored-sources"
## 
## [source.vendored-sources]
## directory = "vendor"
# .cargo/config.toml
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-elf-gcc"

[target.'cfg(target_os = "windows")']
rustflags = [
    "-C", "link-arg=/STACK:4000000", "-Adead_code", "-Aunused_variable", "-Awarnings", "-Ctarget-cpu=native"
]

# Settings for Linux:
[target.'cfg(target_os = "linux")']
rustflags = [
    "-Adead_code", "-Awarnings", "-Ctarget-cpu=native"
]

# Settings for macOS: omit -Ctarget-cpu=native to avoid ring compilation
# failures on aarch64-apple-darwin (ring 0.17.9 static assertions fail with
# target-cpu=native on Apple Silicon).
[target.'cfg(target_os = "macos")']
rustflags = [
    "-Adead_code", "-Awarnings"
]

[build]
#rustc-wrapper = "sccache"
rustflags = ["-Adead_code", "-Awarnings"]
