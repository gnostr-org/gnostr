##version = "0.9"

[dependencies.constant_time_eq]
version = "0.3"

[dependencies.hkdf]
version = "0.12"

##[dependencies.hmac]
##version = "0.12"

##[dependencies.rand_core]
##version = "0.6"
##features = ["getrandom"]

##[dependencies.secp256k1]
##version = "0.29"

##[dependencies.sha2]
##version = "0.10"

##[dependencies.thiserror]
##version = "1.0"

[dev-dependencies.hex]
version = "0.4"

[dev-dependencies.secp256k1]
workspace = true
##version = "0.29.1"
##features = ["hashes", "global-context", "rand-std", "serde"]


[dev-dependencies.serde_json]
version = "1.0"

[build-dependencies]
sha2 = "0.10.9"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
reqwest = { version = "0.12", features = ["blocking", "json"] }
hex = "0.4.3"

